<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네버랩 텔레콤 - 대시보드</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }
    header {
      height: 64px;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
    }
    .user {
      font-size: 14px;
      color: #d1d5db;
    }
    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 64px);
    }
    aside {
      background: white;
      border-right: 1px solid #e5e7eb;
      padding: 20px;
    }
    nav button {
      width: 100%;
      display: block;
      border: none;
      background: transparent;
      text-align: left;
      padding: 13px 14px;
      margin-bottom: 8px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: #374151;
    }
    nav button.active, nav button:hover {
      background: #2563eb;
      color: white;
    }
    .logout {
      margin-top: 24px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: #ef4444;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    main {
      padding: 28px;
    }
    .title {
      margin: 0 0 6px;
      font-size: 28px;
    }
    .subtitle {
      margin: 0 0 24px;
      color: #6b7280;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }
    .card .label {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .card .value {
      font-size: 28px;
      font-weight: 900;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
    .panel {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .btn {
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn.gray { background: #6b7280; }
    .btn.red { background: #dc2626; }
    .btn.green { background: #16a34a; }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th, td {
      padding: 13px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }
    th {
      color: #6b7280;
      background: #f9fafb;
    }
    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #e5e7eb;
    }
    .badge.active { background: #dcfce7; color: #166534; }
    .badge.stop { background: #fee2e2; color: #991b1b; }
    .empty {
      color: #6b7280;
      padding: 18px 0;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid #e5e7eb; }
      .cards { grid-template-columns: 1fr 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">통신 CS 시스템</div>
    <div class="user" id="userInfo"></div>
  </header>

  <div class="layout">
    <aside>
      <nav>
        <button class="active" data-section="home">대시보드</button>
        <button data-section="customers">고객 조회</button>
        <button data-section="openClose">개통 / 해지</button>
        <button data-section="billing">요금 관리</button>
        <button data-section="usage">사용량</button>
        <button data-section="logs">로그 기록</button>
      </nav>
      <button class="logout" id="logoutBtn">로그아웃</button>
    </aside>

    <main>
      <h1 class="title" id="pageTitle">대시보드</h1>
      <p class="subtitle">지점 고객 응대용 CS 프로그램</p>

      <section id="home" class="section active">
        <div class="cards">
          <div class="card"><div class="label">총 고객</div><div class="value" id="totalCustomers">0</div></div>
          <div class="card"><div class="label">정상 회선</div><div class="value" id="activeLines">0</div></div>
          <div class="card"><div class="label">미납 고객</div><div class="value" id="unpaidCustomers">0</div></div>
          <div class="card"><div class="label">오늘 로그</div><div class="value" id="todayLogs">0</div></div>
        </div>

        <div class="panel">
          <h2>최근 로그</h2>
          <div id="recentLogs"></div>
        </div>
      </section>

      <section id="customers" class="section">
        <div class="panel">
          <h2>고객 검색</h2>
          <div class="row">
            <div>
              <label>전화번호</label>
              <input id="searchPhone" placeholder="010-1234-5678" />
            </div>
            <button class="btn" onclick="searchCustomer()">검색</button>
          </div>
          <div id="customerResult" style="margin-top:16px;"></div>
        </div>
      </section>

      <section id="openClose" class="section">
        <div class="panel">
          <h2>신규 개통</h2>
          <div class="row">
            <div><label>고객명</label><input id="newName" placeholder="고객명" /></div>
            <div><label>전화번호</label><input id="newPhone" placeholder="010-0000-0000" /></div>
            <div>
              <label>요금제</label>
              <select id="newPlan">
                <option value="5G 베이직">5G 베이직 / 55000</option>
                <option value="5G 스탠다드">5G 스탠다드 / 75000</option>
                <option value="LTE 라이트">LTE 라이트 / 33000</option>
              </select>
            </div>
            <button class="btn green" onclick="createCustomer()">개통</button>
          </div>
        </div>

        <div class="panel">
          <h2>고객 목록 / 해지</h2>
          <div id="customerTable"></div>
        </div>
      </section>

      <section id="billing" class="section">
        <div class="panel">
          <h2>요금 관리</h2>
          <div id="billingTable"></div>
        </div>
      </section>

      <section id="usage" class="section">
        <div class="panel">
          <h2>사용량 시뮬레이션</h2>
          <div id="usageTable"></div>
        </div>
      </section>

      <section id="logs" class="section">
        <div class="panel">
          <h2>전체 로그</h2>
          <div id="logTable"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "telecom_cs_data";
    const SESSION_KEY = "telecom_cs_session";

    const planPrices = {
      "5G 베이직": 55000,
      "5G 스탠다드": 75000,
      "LTE 라이트": 33000
    };

    let session = JSON.parse(localStorage.getItem(SESSION_KEY));

    if (!session) {
      alert("로그인이 필요해.");
      location.href = "login.html";
    }

    function getData() {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        branches: [],
        employees: [],
        customers: [],
        logs: []
      };
      if (!data.customers) data.customers = [];
      if (!data.logs) data.logs = [];
      return data;
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function addLog(action) {
      const data = getData();
      data.logs.push({
        id: crypto.randomUUID(),
        branchName: session.branchName,
        employeeName: session.employeeName,
        action,
        createdAt: new Date().toISOString()
      });
      saveData(data);
      renderAll();
    }

    function money(n) {
      return Number(n).toLocaleString("ko-KR") + "원";
    }

    function currentBranchCustomers() {
      const data = getData();
      return data.customers.filter(c => c.branchName === session.branchName);
    }

    function renderStats() {
      const data = getData();
      const customers = currentBranchCustomers();
      const today = new Date().toISOString().slice(0, 10);
      const branchLogs = data.logs.filter(l => l.branchName === session.branchName);

      document.getElementById("totalCustomers").textContent = customers.length;
      document.getElementById("activeLines").textContent = customers.filter(c => c.status === "active").length;
      document.getElementById("unpaidCustomers").textContent = customers.filter(c => c.unpaid).length;
      document.getElementById("todayLogs").textContent = branchLogs.filter(l => l.createdAt.slice(0,10) === today).length;

      renderLogs("recentLogs", branchLogs.slice(-5).reverse());
    }

    function renderLogs(targetId, logs) {
      const el = document.getElementById(targetId);
      if (!logs.length) {
        el.innerHTML = '<div class="empty">아직 로그가 없어.</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>시간</th><th>직원</th><th>내용</th></tr></thead>
          <tbody>
            ${logs.map(l => `
              <tr>
                <td>${new Date(l.createdAt).toLocaleString("ko-KR")}</td>
                <td>${l.employeeName}</td>
                <td>${l.action}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function renderCustomerTable() {
      const customers = currentBranchCustomers();
      const el = document.getElementById("customerTable");
      if (!customers.length) {
        el.innerHTML = '<div class="empty">등록된 고객이 없어.</div>';
        return;
      }

      el.innerHTML = `
        <table>
          <thead>
            <tr><th>고객명</th><th>전화번호</th><th>요금제</th><th>상태</th><th>처리</th></tr>
          </thead>
          <tbody>
            ${customers.map(c => `
              <tr>
                <td>${c.name}</td>
                <td>${c.phone}</td>
                <td>${c.plan}</td>
                <td><span class="badge ${c.status === "active" ? "active" : "stop"}">${c.status === "active" ? "정상" : "해지"}</span></td>
                <td>
                  ${c.status === "active"
                    ? `<button class="btn red" onclick="closeLine('${c.id}')">해지</button>`
                    : `<button class="btn green" onclick="reopenLine('${c.id}')">재개통</button>`}
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function renderBillingTable() {
      const customers = currentBranchCustomers();
      const el = document.getElementById("billingTable");
      if (!customers.length) {
        el.innerHTML = '<div class="empty">요금 관리할 고객이 없어.</div>';
        return;
      }

      el.innerHTML = `
        <table>
          <thead>
            <tr><th>고객명</th><th>전화번호</th><th>월 요금</th><th>미납</th><th>처리</th></tr>
          </thead>
          <tbody>
            ${customers.map(c => `
              <tr>
                <td>${c.name}</td>
                <td>${c.phone}</td>
                <td>${money(c.monthlyFee)}</td>
                <td>${c.unpaid ? "미납" : "정상"}</td>
                <td>
                  ${c.unpaid
                    ? `<button class="btn green" onclick="payBill('${c.id}')">납부 처리</button>`
                    : `<button class="btn gray" onclick="makeUnpaid('${c.id}')">미납 처리</button>`}
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function renderUsageTable() {
      const customers = currentBranchCustomers();
      const el = document.getElementById("usageTable");
      if (!customers.length) {
        el.innerHTML = '<div class="empty">사용량 표시할 고객이 없어.</div>';
        return;
      }

      el.innerHTML = `
        <table>
          <thead>
            <tr><th>고객명</th><th>전화번호</th><th>데이터</th><th>통화</th><th>문자</th><th>증가</th></tr>
          </thead>
          <tbody>
            ${customers.map(c => `
              <tr>
                <td>${c.name}</td>
                <td>${c.phone}</td>
                <td>${c.usage.data}GB</td>
                <td>${c.usage.call}분</td>
                <td>${c.usage.sms}건</td>
                <td>
                  <button class="btn" onclick="increaseUsage('${c.id}', 'data')">데이터 +1</button>
                  <button class="btn" onclick="increaseUsage('${c.id}', 'call')">통화 +10</button>
                  <button class="btn" onclick="increaseUsage('${c.id}', 'sms')">문자 +5</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function renderAll() {
      if (!session) return;
      document.getElementById("userInfo").textContent =
        `${session.branchName} / ${session.employeeName} (${session.role})`;
      renderStats();
      renderCustomerTable();
      renderBillingTable();
      renderUsageTable();

      const data = getData();
      const branchLogs = data.logs.filter(l => l.branchName === session.branchName).slice().reverse();
      renderLogs("logTable", branchLogs);
    }

    function createCustomer() {
      const name = document.getElementById("newName").value.trim();
      const phone = document.getElementById("newPhone").value.trim();
      const plan = document.getElementById("newPlan").value;

      if (!name || !phone) {
        alert("고객명과 전화번호를 입력해줘.");
        return;
      }

      const data = getData();
      const duplicate = data.customers.some(c => c.phone === phone);

      if (duplicate) {
        alert("이미 등록된 전화번호야.");
        return;
      }

      data.customers.push({
        id: crypto.randomUUID(),
        branchName: session.branchName,
        name,
        phone,
        plan,
        monthlyFee: planPrices[plan],
        unpaid: false,
        status: "active",
        usage: { data: 0, call: 0, sms: 0 },
        createdAt: new Date().toISOString()
      });

      saveData(data);
      addLog(`신규 개통: ${name} / ${phone} / ${plan}`);

      document.getElementById("newName").value = "";
      document.getElementById("newPhone").value = "";
    }

    function updateCustomer(id, updater, logText) {
      const data = getData();
      const target = data.customers.find(c => c.id === id && c.branchName === session.branchName);
      if (!target) return;
      updater(target);
      saveData(data);
      addLog(logText);
    }

    function closeLine(id) {
      updateCustomer(id, c => c.status = "closed", "회선 해지 처리");
    }

    function reopenLine(id) {
      updateCustomer(id, c => c.status = "active", "회선 재개통 처리");
    }

    function payBill(id) {
      updateCustomer(id, c => c.unpaid = false, "요금 납부 처리");
    }

    function makeUnpaid(id) {
      updateCustomer(id, c => c.unpaid = true, "요금 미납 처리");
    }

    function increaseUsage(id, type) {
      updateCustomer(id, c => {
        if (type === "data") c.usage.data += 1;
        if (type === "call") c.usage.call += 10;
        if (type === "sms") c.usage.sms += 5;
      }, `사용량 증가: ${type}`);
    }

    function searchCustomer() {
      const phone = document.getElementById("searchPhone").value.trim();
      const customer = currentBranchCustomers().find(c => c.phone.includes(phone));
      const el = document.getElementById("customerResult");

      if (!phone) {
        alert("전화번호를 입력해줘.");
        return;
      }

      if (!customer) {
        el.innerHTML = '<div class="empty">검색 결과가 없어.</div>';
        addLog(`고객 조회 실패: ${phone}`);
        return;
      }

      el.innerHTML = `
        <table>
          <tr><th>고객명</th><td>${customer.name}</td></tr>
          <tr><th>전화번호</th><td>${customer.phone}</td></tr>
          <tr><th>요금제</th><td>${customer.plan}</td></tr>
          <tr><th>월 요금</th><td>${money(customer.monthlyFee)}</td></tr>
          <tr><th>회선 상태</th><td>${customer.status === "active" ? "정상" : "해지"}</td></tr>
          <tr><th>미납 여부</th><td>${customer.unpaid ? "미납" : "정상"}</td></tr>
          <tr><th>사용량</th><td>데이터 ${customer.usage.data}GB / 통화 ${customer.usage.call}분 / 문자 ${customer.usage.sms}건</td></tr>
        </table>
      `;
      addLog(`고객 조회: ${customer.name} / ${customer.phone}`);
    }

    document.querySelectorAll("nav button[data-section]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));

        btn.classList.add("active");
        document.getElementById(btn.dataset.section).classList.add("active");
        document.getElementById("pageTitle").textContent = btn.textContent;
        renderAll();
      });
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      addLog("로그아웃");
      localStorage.removeItem(SESSION_KEY);
      location.href = "login.html";
    });

    renderAll();
  </script>
</body>
</html>
