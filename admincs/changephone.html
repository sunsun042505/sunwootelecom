<section id="step3" class="panel step-page"><h2>서명 단계</h2><div class="sign-box"><canvas id="signaturePad" width="900" height="220"></canvas></div><div class="actions"><button class="btn gray" onclick="goStep(2)">이전</button><button class="btn gray" onclick="clearSignature()">서명 지우기</button><button class="btn green" onclick="finishChangePhone()">다음</button></div></section>
<section id="step4" class="panel step-page"><div class="done"><h2>기기변경이 완료됐습니다</h2><table id="completeSummary"></table><div class="actions" style="justify-content:center"><button class="btn" onclick="location.href='dashboard.html'">대시보드로 이동</button><button class="btn gray" onclick="location.href='changephone.html'">새 기기변경</button></div></div></section></div></main><script>
const TOKEN_KEY='neverlab_token', token=localStorage.getItem(TOKEN_KEY); if(!token) location.href='login.html'; const API='/.netlify/functions/api'; let precheck=JSON.parse(sessionStorage.getItem('neverlab_changephone_precheck')||'{}'), capturedPhoto='', signatureDone=false, stream=null;
async function api(path,options={}){const res=await fetch(API+path,{...options,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(options.headers||{})}}); const data=await res.json(); if(!res.ok) throw new Error(data.message||'요청 실패'); return data;}
function init(){customerName.value=precheck.name||''; phone.value=precheck.phone||''; device.value=precheck.device||''; userInfo.textContent=`${precheck.branchName||'지점'} / ${precheck.employeeName||'직원'}`; precheckView.innerHTML=`<b>기기변경 대상</b><br>이름: ${precheck.name||''} / 전화번호: ${precheck.phone||''} / 바꿀 기기: ${precheck.device||''}`; setupSignature();}
function goStep(n){document.querySelectorAll('.step-page').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('step'+n).classList.add('active');document.querySelector(`[data-step-label="${n}"]`).classList.add('active');}
function goStep2(){if(!customerName.value.trim())return alert('이름을 입력해줘.'); if(!phone.value.trim())return alert('전화번호를 입력해줘.'); if(!device.value.trim())return alert('기기를 선택해줘.'); goStep(2);}
async function startCamera(){try{stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false}); camera.srcObject=stream;}catch{alert('카메라 권한을 확인해줘.')}}
function takePhoto(){if(!camera.srcObject)return alert('먼저 카메라 시작을 눌러줘.'); photoCanvas.getContext('2d').drawImage(camera,0,0,photoCanvas.width,photoCanvas.height); capturedPhoto=photoCanvas.toDataURL('image/png'); photoPreview.innerHTML=`<p><b>촬영 완료</b></p><img src="${capturedPhoto}">`;}
function goStep3(){if(!capturedPhoto)return alert('신분증 촬영을 먼저 해줘.'); if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;} goStep(3);}
function setupSignature(){const c=signaturePad,ctx=c.getContext('2d');let d=false;const pos=e=>{const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return {x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}};function st(e){d=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();}function mv(e){if(!d)return;const p=pos(e);ctx.lineWidth=3;ctx.lineCap='round';ctx.lineTo(p.x,p.y);ctx.stroke();signatureDone=true;e.preventDefault();}function en(){d=false}c.addEventListener('mousedown',st);c.addEventListener('mousemove',mv);window.addEventListener('mouseup',en);c.addEventListener('touchstart',st);c.addEventListener('touchmove',mv);window.addEventListener('touchend',en);}
function clearSignature(){signaturePad.getContext('2d').clearRect(0,0,signaturePad.width,signaturePad.height);signatureDone=false;}
async function finishChangePhone(){if(!signatureDone)return alert('서명을 먼저 해줘.');const s={title:formTitle.value.trim(),name:customerName.value.trim(),phone:phone.value.trim(),device:device.value,installment:installment.value,contract:contract.value,plan:plan.value,delivery:delivery.value,branchName:precheck.branchName||'',employeeName:precheck.employeeName||''};try{await api('/device-change-complete',{method:'POST',body:JSON.stringify(s)});}catch(e){alert(e.message);return;}completeSummary.innerHTML=`<tr><th>제목</th><td>${s.title}</td></tr><tr><th>이름</th><td>${s.name}</td></tr><tr><th>전화번호</th><td>${s.phone}</td></tr><tr><th>바꿀 기기</th><td>${s.device}</td></tr><tr><th>할부여부</th><td>${s.installment}</td></tr><tr><th>약정여부</th><td>${s.contract}</td></tr><tr><th>요금제</th><td>${s.plan}</td></tr><tr><th>배송방법</th><td>${s.delivery}</td></tr><tr><th>처리 지점/직원</th><td>${s.branchName} / ${s.employeeName}</td></tr>`;goStep(4);}
init();</script></body></html>
