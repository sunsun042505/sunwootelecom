<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네버랩텔레콤지점 - 로그인</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1f2937;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    .sub {
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 14px;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.14);
    }
    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .msg {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }
    .error { color: #dc2626; }
    .success { color: #16a34a; }
    .link {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }
    .link a {
      color: #2563eb;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>통신 CS 로그인</h1>
    <p class="sub">지점명, 직원명, 비밀번호로 로그인</p>

    <form id="loginForm">
      <label for="branchName">지점명</label>
      <input id="branchName" type="text" placeholder="예: 강남중앙점" required />

      <label for="employeeName">직원명</label>
      <input id="employeeName" type="text" placeholder="예: 홍길동" required />

      <label for="password">비밀번호</label>
      <input id="password" type="password" placeholder="비밀번호 입력" required />

      <button type="submit">로그인</button>
      <div id="message" class="msg"></div>
    </form>

    <div class="link">
      계정이 없으면 <a href="signup.html">가입하기</a>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "telecom_cs_data";

    function getData() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        branches: [],
        employees: [],
        logs: []
      };
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function addLog(data, employee, action) {
      data.logs.push({
        id: crypto.randomUUID(),
        branchName: employee.branchName,
        employeeName: employee.employeeName,
        action,
        createdAt: new Date().toISOString()
      });
      saveData(data);
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const branchName = document.getElementById("branchName").value.trim();
      const employeeName = document.getElementById("employeeName").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      const data = getData();

      const branch = data.branches.find(b => b.branchName === branchName);
      if (!branch) {
        message.className = "msg error";
        message.textContent = "등록되지 않은 지점명이야.";
        return;
      }

      const employee = data.employees.find(emp =>
        emp.branchName === branchName &&
        emp.employeeName === employeeName &&
        emp.password === password
      );

      if (!employee) {
        message.className = "msg error";
        message.textContent = "직원명 또는 비밀번호가 맞지 않아.";
        return;
      }

      const session = {
        branchName: employee.branchName,
        employeeName: employee.employeeName,
        role: employee.role,
        loginAt: new Date().toISOString()
      };

      localStorage.setItem("telecom_cs_session", JSON.stringify(session));
      addLog(data, employee, "로그인");

      message.className = "msg success";
      message.textContent = "로그인 성공! 대시보드로 이동할게.";

      setTimeout(() => {
        alert("아직 dashboard.html은 안 만들었어. 다음 단계에서 만들면 여기로 이동하면 돼.");
        // location.href = "dashboard.html";
      }, 500);
    });
  </script>
</body>
</html>
